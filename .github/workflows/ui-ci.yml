name: CI

# ui-build-pipeline.md §3: prepare -> compile -> test -> package -> publish,
# covering both components (Cargo for /src, dotnet for /ui) in one workflow -
# ui-build-pipeline.md §1 describes CI building both components together, not
# /ui in isolation.
#
# Runs as a win-x64/win-arm64 matrix (ui-build-pipeline.md §3, §7.1): cargo
# build --release has no --target pin, so it always builds for the runner's
# own host triple - there's no cross-compilation here, meaning an ARM64
# llx.exe (and a real exercise of the NativeTreeSitter-tagged tests against
# ui/native/win-arm64/'s DLLs) requires actually running on ARM64 hardware,
# not just a separate packaging step. windows-11-arm is GitHub-hosted and
# free for public repos (currently public preview) but does not work on
# private repos - moot for this repo, which doesn't have Actions enabled at
# all; these workflows are prepared for the public repo this ships to.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test-package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            runner: windows-latest
          - rid: win-arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
      # --- Prepare stage (§3.2) ---
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ matrix.rid }}-${{ hashFiles('ui/packages.lock.json', 'ui/tests/packages.lock.json') }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ matrix.rid }}-${{ hashFiles('Cargo.lock') }}

      - name: Validate lockfiles are present and committed
        shell: bash
        run: |
          test -f Cargo.lock || { echo "::error::Cargo.lock is missing"; exit 1; }
          test -f ui/packages.lock.json || { echo "::error::ui/packages.lock.json is missing"; exit 1; }
          test -f ui/tests/packages.lock.json || { echo "::error::ui/tests/packages.lock.json is missing"; exit 1; }

      - name: Restore /ui (locked mode)
        run: dotnet restore ui/LimelightX.slnx --locked-mode

      - name: Restore /src (locked mode)
        run: cargo fetch --locked

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Dependency audit - /src (cargo audit)
        run: cargo audit

      - name: Dependency audit - /ui (dotnet vulnerable packages)
        shell: bash
        run: |
          out=$(dotnet list ui/LimelightX.slnx package --vulnerable --include-transitive)
          echo "$out"
          if echo "$out" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable NuGet packages detected"
            exit 1
          fi

      # --- Compile stage (§3.3) ---
      - name: Build /ui (Release, warnings as errors)
        run: dotnet build ui/LimelightX.slnx -c Release --no-restore -warnaserror

      - name: Format check - /ui
        run: dotnet format ui/LimelightX.slnx --verify-no-changes

      - name: Build /src (Release)
        run: cargo build --release --locked

      - name: Format check - /src (rustfmt)
        run: cargo fmt --check

      - name: Lint - /src (clippy)
        run: cargo clippy --release --all-targets --locked -- -D warnings

      # --- Test stage (§3.4) ---
      # NativeTreeSitter-tagged tests P/Invoke tree-sitter-limelightx.dll /
      # tree-sitter-runtime.dll. ui/native/ is split per-RID (ui/native/win-x64/,
      # ui/native/win-arm64/ - LimelightX.UI.csproj resolves the right one
      # automatically, falling back to host OS architecture when no RID is
      # pinned, which is the case here). Both RIDs' binaries are committed, so
      # each matrix leg exercises the NativeTreeSitter tests for real against
      # its own architecture's binaries - no filter needed.
      - name: Test /ui
        run: dotnet test ui/LimelightX.slnx -c Release --no-build

      - name: Test /src
        run: cargo test --release --locked

      # --- Package stage (§3.5) ---
      - name: Publish LimelightX.UI
        run: dotnet publish ui/LimelightX.UI.csproj -c Release -r ${{ matrix.rid }} --self-contained false

      - name: Stage portable bundle
        shell: pwsh
        run: ./ui/packaging/stage-bundle.ps1 -Rid ${{ matrix.rid }}

      - name: Validate bundle structure
        shell: pwsh
        run: |
          $layoutDir = "ui/packaging/layout"
          if (-not (Test-Path "$layoutDir/LimelightX.exe")) { throw "Staged bundle is missing LimelightX.exe" }
          if (-not (Test-Path "$layoutDir/llx.exe")) { throw "Staged bundle is missing llx.exe" }
          Write-Host "Bundle structure validated: LimelightX.exe and llx.exe both present."

      # --- Artifact publishing stage (§3.6) ---
      # Artifact names carry a per-RID suffix - GitHub Actions requires unique
      # artifact names across matrix legs within one workflow run.
      - name: Upload LimelightX.exe + llx.exe bundle (stable channel)
        uses: actions/upload-artifact@v4
        with:
          name: limelight-x-bundle-stable-${{ matrix.rid }}
          path: |
            ui/packaging/layout/**
          if-no-files-found: error
