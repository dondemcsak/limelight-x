name: Release

# ui-build-pipeline.md §4: tag push -> full CI build workflow -> GitHub Releases,
# stable channel only (§9.1) - no beta/nightly/experimental channels.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ui-ci.yml

  publish-release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: limelight-x-bundle-stable
          path: dist/bundle

      - name: Download MSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: limelight-x-msix-stable
          path: dist/msix

      - name: Stage release assets
        shell: bash
        run: |
          mkdir -p dist/release
          cp dist/bundle/LimelightX.exe dist/release/LimelightX.exe
          cp dist/bundle/llx.exe dist/release/llx.exe
          cp dist/msix/LimelightX.msix dist/release/LimelightX.msix

      - name: Create GitHub Release (stable channel)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/LimelightX.exe
            dist/release/llx.exe
            dist/release/LimelightX.msix
          generate_release_notes: true
          prerelease: false
          draft: false
